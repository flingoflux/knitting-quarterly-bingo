name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - name: Lint
        run: pnpm lint
      - name: Format Check
        run: pnpm format --check

  build-and-test:
    runs-on: ubuntu-latest
    needs: lint-and-format
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - name: Run Unit Tests
        run: pnpm test
      - name: Coverage
        run: pnpm test --coverage
      - name: Build
        run: pnpm build
      - name: Start App (Background)
        run: pnpm start &
      - name: Wait for App
        run: sleep 10
      - name: Healthcheck
        run: curl -f http://localhost:4200 || exit 1
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
