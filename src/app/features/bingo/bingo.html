
<div class="board-header">
  <button class="home-btn" (click)="goHome()" title="Zur Startseite">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#256029" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 4l9 5.5V20a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9.5z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </button>
  <h2>Knitting Bingo</h2>
</div>


<div class="grid">
  <div
    *ngFor="let p of board.getProjects(); let i = index"
    class="cell"
    [class.done]="board.getDone()[i]"
    [class.drag-target]="dragTargetIndex === i"
    [class.bingo-cell]="isCellInBingo(i)"
    [draggable]="mode === 'edit'"
    (click)="toggle(i)"
    (dragstart)="dragStart(i)"
    (dragover)="$event.preventDefault(); dragOver(i)"
    (dragleave)="dragLeave(i)"
    (drop)="drop(i)"
  >
    <div class="cell-content">
      <span *ngIf="isCellInBingo(i)" class="bingo-check">✔️</span>
      <div class="title">{{p.title}}</div>
      <div class="cat" [ngClass]="'cat-' + p.catKey">{{p.cat}}</div>
    </div>
  </div>
</div>

<div class="actions">
  <button *ngIf="mode === 'edit'" (click)="reset()">Zurücksetzen</button>
  <button *ngIf="mode === 'edit'" (click)="shuffle()">Felder würfeln</button>
  <button *ngIf="mode === 'edit'" (click)="startGame()">Bingo spielen</button>
  <button *ngIf="mode === 'play'" (click)="reset()">Zurücksetzen</button>
</div>
<style>
.board-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.home-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0.2rem 0.4rem 0.2rem 0.2rem;
  border-radius: 50%;
  transition: background 0.2s;
}
.home-btn:hover {
  background: #e6f4ea;
}
</style>
