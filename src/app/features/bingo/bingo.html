<h2>Knitting Bingo</h2>



<div *ngIf="bingoLines.length" class="banner">
  BINGO! 🎉 ({{bingoLines.length}})
</div>

<div class="grid">
  <div 
    *ngFor="let p of projects; let i = index"
    class="cell"
    [class.done]="done[i]"
    [class.drag-target]="dragTargetIndex === i"
    draggable="true"
    (click)="toggle(i)"
    (dragstart)="dragStart(i)"
    (dragover)="$event.preventDefault(); dragOver(i)"
    (dragleave)="dragLeave(i)"
    (drop)="drop(i)"
  >
    <div class="cell-content">
      <div class="title">{{p.title}}</div>
      <div class="cat" [ngClass]="'cat-' + p.catKey">
        {{p.cat}}
      </div>
    </div>
  </div>
</div>

<div class="actions">
  <button (click)="reset()">Zurücksetzen</button>
  <button (click)="shuffle()">Felder würfeln</button>
</div>
