<!doctype html>
<html>
  <head>
    <link rel="icon" type="image/svg+xml" href="/assets/flower.svg?v=1" />
    <title>Knitting Quarterly Bingo</title>
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
